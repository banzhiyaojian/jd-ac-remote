<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朋友圈便携小空调 - 京东全职骑手专属版</title>
    <style>
        /* --- 全局样式 --- */
        body {
            background-color: #f7f9fc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 40px;
            color: #333;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #2c3e50;
        }

        .tip {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- 空调主体 (屏幕部分) --- */
        .ac-unit {
            width: 320px;
            height: 160px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* 左侧能效标识 */
        .energy-label {
            width: 60px;
            height: 80px;
            background: linear-gradient(to bottom, #eef2f3, #fff);
            border: 1px solid #eee;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0.8;
        }
        .energy-bar {
            width: 30px;
            height: 6px;
            margin: 2px 0;
            border-radius: 2px;
        }

        /* 右侧显示屏区域 */
        .display-area {
            text-align: right;
            flex-grow: 1;
            margin-left: 20px;
            opacity: 0.3; /* 默认关机状态比较暗 */
            transition: opacity 0.3s;
        }

        .mode-icon {
            font-size: 24px;
            margin-bottom: 5px;
            color: #ccc;
        }

        .temperature {
            font-size: 48px;
            font-weight: 300;
            color: #333;
            line-height: 1;
        }

        .unit {
            font-size: 20px;
            vertical-align: top;
        }

        /* 运行指示灯 */
        .status-light {
            position: absolute;
            bottom: 15px;
            right: 20px;
            width: 8px;
            height: 8px;
            background-color: #ddd;
            border-radius: 50%;
            transition: background-color 0.3s;
        }

        /* --- 出风口动画 --- */
        .vents {
            display: flex;
            justify-content: space-around;
            width: 300px;
            margin-top: 20px;
        }
        .vent-line {
            width: 4px;
            height: 30px;
            background-color: #ccc;
            transform: skewX(-10deg);
            transition: all 0.5s;
        }

        /* --- 控制面板 (按钮) --- */
        .controls {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        button {
            border: none;
            outline: none;
            cursor: pointer;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.1s, filter 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            filter: grayscale(100%);
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 按钮特定颜色 */
        .btn-cool { background-color: #4a6ee0; } /* 蓝色 */
        .btn-power { background-color: #5cb85c; } /* 绿色 */
        .btn-heat { background-color: #f0ad4e; } /* 橙色 */
        .btn-temp { background-color: #e0e0e0; color: #555; width: 50px; height: 50px;} /* 灰色 */

        /* --- 激活状态的样式类 --- */
        .ac-unit.on .display-area {
            opacity: 1;
        }
        .ac-unit.on .status-light {
            background-color: #5cb85c; /* 绿灯亮 */
            box-shadow: 0 0 5px #5cb85c;
        }
        .ac-unit.on .vent-line {
            background-color: #aaa;
            height: 40px; /* 出风变长 */
        }

        /* 底部版权 */
        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 12px;
            color: #999;
        }
        footer a {
            color: #4a6ee0;
            text-decoration: none;
        }

    </style>
</head>
<body>

    <h1>便携小空调</h1>
    <div class="tip">💡 Tip: 为你的夏日带来清凉！</div>

    <!-- 空调机身 -->
    <div class="ac-unit" id="acUnit">
        <!-- 左侧装饰图 -->
        <div class="energy-label">
            <div class="energy-bar" style="background:#5cb85c"></div>
            <div class="energy-bar" style="background:#f0ad4e"></div>
            <div class="energy-bar" style="background:#d9534f"></div>
            <div style="font-size:8px; margin-top:5px; color:#999;">ENERGY</div>
        </div>

        <!-- 右侧显示区 -->
        <div class="display-area">
            <div class="mode-icon" id="modeIcon">❄️</div>
            <div class="temperature">
                <span id="tempDisplay">16</span><span class="unit">°C</span>
            </div>
        </div>

        <!-- 运行指示灯 -->
        <div class="status-light"></div>
    </div>

    <!-- 出风口装饰 -->
    <div class="vents">
        <div class="vent-line"></div>
        <div class="vent-line"></div>
        <div class="vent-line"></div>
    </div>

    <!-- 控制按钮 -->
    <div class="controls">
        <div class="row">
            <button class="btn-cool" onclick="setMode('cool')" title="制冷">❄️</button>
            <button class="btn-power" onclick="togglePower()" title="开关">⏻</button>
            <button class="btn-heat" onclick="setMode('heat')" title="制热">☀️</button>
        </div>
        <div class="row">
            <button class="btn-temp" onclick="changeTemp(1)" title="升温">∧</button>
        </div>
        <div class="row">
            <button class="btn-temp" onclick="changeTemp(-1)" title="降温">∨</button>
        </div>
    </div>

    <footer>
        2026 © Air Conditioner - <a href="#">我想你了</a>
    </footer>

    <script>
        // 初始化状态
        let isOn = false;
        let currentTemp = 16;
        let mode = 'cool'; // 'cool' or 'heat'

        const acUnit = document.getElementById('acUnit');
        const tempDisplay = document.getElementById('tempDisplay');
        const modeIcon = document.getElementById('modeIcon');

        // 开关机功能
        function togglePower() {
            isOn = !isOn;
            if (isOn) {
                acUnit.classList.add('on');
            } else {
                acUnit.classList.remove('on');
            }
        }

        // 设置模式（制冷/制热）
        function setMode(newMode) {
            if (!isOn) return; // 没开机不能调模式

            mode = newMode;
            if (mode === 'cool') {
                modeIcon.innerText = '❄️';
                // 可以在这里添加改变背景色等逻辑
            } else {
                modeIcon.innerText = '☀️';
            }
        }

        // 调节温度
        function changeTemp(delta) {
            if (!isOn) return; // 没开机不能调温

            currentTemp += delta;

            // 限制温度范围，比如 16度 - 30度
            if (currentTemp < 16) currentTemp = 16;
            if (currentTemp > 30) currentTemp = 30;

            tempDisplay.innerText = currentTemp;
        }
    </script>
</body>
</html>
