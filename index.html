<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朋友圈便携小空调 - 京东金源版</title>
    <style>
        /* --- 全局样式 --- */
        body {
            background-color: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 40px;
            user-select: none;
            overflow: hidden; /* 防止滚动 */
        }

        h1 { margin: 0; color: #333; font-size: 26px; letter-spacing: 2px; }
        .tip { color: #999; font-size: 14px; margin-top: 10px; display: flex; align-items: center; gap: 5px; }

        /* --- 空调主体 --- */
        .ac-unit {
            width: 320px;
            height: 180px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-top: 30px;
            position: relative;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* 品牌 Logo */
        .brand-logo {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 10px;
            color: #e4393c; /* 京东红 */
            font-weight: bold;
            opacity: 0.8;
            z-index: 10;
            display: flex;
            align-items: center;
        }
        .brand-logo::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #e4393c;
            margin-right: 4px;
            border-radius: 2px;
        }

        /* 左侧能效标识贴纸 */
        .energy-sticker {
            width: 60px;
            height: 80px;
            background: linear-gradient(to bottom, #00aaff 0%, #fff 100%);
            border-radius: 8px;
            border: 1px solid #eee;
            margin-top: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .sticker-bar { width: 40px; height: 4px; margin: 2px 0; border-radius: 2px; }

        /* 右侧显示屏区域 */
        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            padding-right: 20px;
        }

        .temp-display {
            font-size: 60px;
            font-weight: 300;
            color: #ccc; /* 关机状态颜色 */
            font-family: 'Courier New', monospace;
            transition: color 0.3s;
            text-shadow: 0 0 0 transparent;
        }

        /* 开机后的显示效果 */
        .ac-unit.on .temp-display {
            color: #333;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        /* 极限温度警告动画 */
        @keyframes flash-red {
            0% { color: #ff4d4f; transform: scale(1); }
            50% { color: #ff0000; transform: scale(1.1); text-shadow: 0 0 15px rgba(255,0,0,0.5); }
            100% { color: #ff4d4f; transform: scale(1); }
        }
        .warning-flash {
            animation: flash-red 0.5s ease-in-out 3; /* 闪烁3次 */
        }

        /* 出风口飘带 */
        .ribbons {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .ac-unit.on .ribbons { opacity: 1; }

        .ribbon {
            width: 40px;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            transform-origin: left center;
        }

        /* 飘带动画 */
        .ac-unit.on .ribbon:nth-child(1) { animation: swing 1.5s infinite ease-in-out alternate; }
        .ac-unit.on .ribbon:nth-child(2) { animation: swing 1.8s infinite ease-in-out alternate-reverse; }
        .ac-unit.on .ribbon:nth-child(3) { animation: swing 1.2s infinite ease-in-out alternate; }

        @keyframes swing {
            from { transform: rotate(-10deg) scaleX(0.9); }
            to { transform: rotate(10deg) scaleX(1.1); }
        }

        /* --- 控制面板 --- */
        .controls {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .row { display: flex; gap: 30px; }

        button {
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.1s, box-shadow 0.1s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 按钮特定样式 */
        .btn-cool { background: #4b6cb7; color: white; } /* 蓝 */
        .btn-power { background: #ff0055; color: white; width: 70px; height: 70px; } /* 粉/红 */
        .btn-heat { background: #ffb347; color: white; } /* 黄/橙 */
        .btn-temp { background: #e0e0e0; color: #555; width: 50px; height: 50px; }

        /* SVG 图标大小 */
        svg { width: 28px; height: 28px; fill: currentColor; }
        .btn-power svg { width: 32px; height: 32px; }

        footer {
            margin-top: auto;
            padding-bottom: 30px;
            color: #bbb;
            font-size: 12px;
        }
        footer span { color: #666; }

    </style>
</head>
<body>

    <h1>便携小空调</h1>
    <div class="tip">💡 Tip: 为你的夏日带来清凉！</div>

    <!-- 空调主体 -->
    <div class="ac-unit" id="acUnit">
        <!-- 品牌 Logo -->
        <div class="brand-logo">京东（金源站）制造</div>

        <!-- 能效贴纸 -->
        <div class="energy-sticker">
            <div class="sticker-bar" style="background:#009900"></div>
            <div class="sticker-bar" style="background:#66cc00"></div>
            <div class="sticker-bar" style="background:#ffff00"></div>
            <div class="sticker-bar" style="background:#ff9900"></div>
            <div class="sticker-bar" style="background:#ff3300"></div>
        </div>

        <!-- 显示屏 -->
        <div class="display-area">
            <div class="temp-display" id="tempDisplay">--</div>
        </div>

        <!-- 出风飘带 -->
        <div class="ribbons">
            <div class="ribbon"></div>
            <div class="ribbon"></div>
            <div class="ribbon"></div>
        </div>
    </div>

    <!-- 控制按钮 -->
    <div class="controls">
        <div class="row">
            <button class="btn-cool" onclick="setMode('cool')">❄️</button>
            <button class="btn-power" onclick="togglePower()">⏻</button>
            <button class="btn-heat" onclick="setMode('heat')">☀️</button>
        </div>
        <div class="row">
            <button class="btn-temp" onclick="changeTemp(1)">︿</button>
        </div>
        <div class="row">
            <button class="btn-temp" onclick="changeTemp(-1)">﹀</button>
        </div>
    </div>

    <footer>
        2026 © Air Conditioner - <span>我想你了</span>
    </footer>

    <script>
        // 状态变量
        let isOn = false;
        let temp = 26;
        const minTemp = 16;
        const maxTemp = 30;

        // DOM 元素
        const acUnit = document.getElementById('acUnit');
        const tempDisplay = document.getElementById('tempDisplay');

        // 音频上下文 (用于生成简单的提示音)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // 播放提示音函数 (Beep)
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'power') {
                // 开机声：长滴
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'limit') {
                // 极限报警：短促双滴
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);

                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.type = 'square';
                    osc2.frequency.setValueAtTime(600, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.1);
                }, 150);
            } else {
                // 普通调节：轻微滴
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.05);
            }
        }

        // 开关机逻辑
        function togglePower() {
            isOn = !isOn;
            playSound('power');

            if (isOn) {
                acUnit.classList.add('on');
                updateDisplay();
            } else {
                acUnit.classList.remove('on');
                tempDisplay.innerText = "--";
                tempDisplay.style.color = "#ccc";
                tempDisplay.classList.remove('warning-flash');
            }
        }

        // 模式切换 (视觉反馈)
        function setMode(mode) {
            if (!isOn) return;
            playSound('adjust');
            // 这里可以添加改变颜色的逻辑，目前保持简洁
            console.log("Mode switched to: " + mode);
        }

        // 调节温度
        function changeTemp(delta) {
            if (!isOn) return;

            let newTemp = temp + delta;

            // 检查极限
            if (newTemp < minTemp || newTemp > maxTemp) {
                playSound('limit');
                triggerWarning();
                return;
            }

            temp = newTemp;
            playSound('adjust');
            updateDisplay();
        }

        // 更新屏幕显示
        function updateDisplay() {
            tempDisplay.innerText = temp + "°C";
            tempDisplay.classList.remove('warning-flash'); // 清除之前的警告状态
        }

        // 触发极限警告动画
        function triggerWarning() {
            tempDisplay.classList.remove('warning-flash');
            void tempDisplay.offsetWidth; // 触发重绘以重置动画
            tempDisplay.classList.add('warning-flash');
        }

    </script>
</body>
</html>
