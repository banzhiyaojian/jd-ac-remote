<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朋友圈便携小空调 - 京东金源版</title>
    <style>
        /* --- 全局样式 --- */
        body {
            background-color: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 40px;
            user-select: none;
        }

        h1 { margin: 0; color: #333; font-size: 26px; letter-spacing: 2px; }
        .tip { color: #999; font-size: 14px; margin-top: 10px; display: flex; align-items: center; gap: 5px; }

        /* --- 空调主体 --- */
        .ac-body {
            width: 320px;
            height: 180px;
            background: linear-gradient(180deg, #ffffff 0%, #f0f2f5 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1), inset 0 1px 1px rgba(255,255,255,0.8);
            margin-top: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* 京东Logo */
        .jd-logo {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: #e1251b; /* 京东红 */
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(225, 37, 27, 0.3);
            display: flex;
            align-items: center;
        }
        .jd-logo::before {
            content: "JD";
            margin-right: 4px;
            font-style: italic;
            font-family: Arial, sans-serif;
        }

        /* 显示屏区域 */
        .screen {
            position: absolute;
            top: 20px;
            right: 30px;
            width: 100px;
            height: 60px;
            background-color: #dceefc; /* 关机状态 */
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: 32px;
            color: #aaccdd;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        /* 开机后的屏幕效果 */
        .ac-body.on .screen {
            background-color: #e6f7ff;
            color: #007aff;
            text-shadow: 0 0 5px rgba(0, 122, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.2), inset 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 出风口飘带模拟 */
        .ribbons {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .ac-body.on .ribbons {
            opacity: 1;
        }
        .ribbon {
            width: 4px;
            height: 40px;
            background: #ccc;
            border-radius: 2px;
            transform-origin: top center;
        }
        .ac-body.on .ribbon:nth-child(1) { animation: swing 1.5s infinite ease-in-out alternate; }
        .ac-body.on .ribbon:nth-child(2) { animation: swing 1.8s infinite ease-in-out alternate-reverse; }
        .ac-body.on .ribbon:nth-child(3) { animation: swing 1.6s infinite ease-in-out alternate; }

        @keyframes swing {
            from { transform: rotate(-10deg); }
            to { transform: rotate(10deg); }
        }

        /* --- 控制面板 --- */
        .controls {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .row { display: flex; gap: 20px; }

        button {
            border: none;
            outline: none;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.1s, box-shadow 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 按钮颜色定义 */
        .btn-mode { width: 60px; height: 60px; background-color: #4a6ee0; color: white; } /* 蓝色制冷 */
        .btn-power { width: 60px; height: 60px; background-color: #eb2f64; color: white; } /* 粉色电源 */
        .btn-heat { width: 60px; height: 60px; background-color: #faad14; color: white; } /* 黄色制热 */
        .btn-temp { width: 50px; height: 50px; background-color: #e4e7ed; color: #555; font-size: 20px; }

        /* --- 浮动提示文字 --- */
        .float-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(255, 50, 50, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            white-space: nowrap;
        }
        .float-msg.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        footer {
            margin-top: auto;
            padding-bottom: 30px;
            color: #bbb;
            font-size: 12px;
        }
        footer a { color: #4a6ee0; text-decoration: none; }
    </style>
</head>
<body>

    <h1>便携小空调</h1>
    <div class="tip">💡 Tip: 为你的夏日带来清凉！</div>

    <!-- 空调主体 -->
    <div class="ac-body" id="acBody">
        <!-- 京东Logo -->
        <div class="jd-logo">京东 (金源站) 制造</div>

        <!-- 屏幕显示 -->
        <div class="screen" id="tempDisplay">--</div>

        <!-- 飘带 (出风模拟) -->
        <div class="ribbons">
            <div class="ribbon"></div>
            <div class="ribbon"></div>
            <div class="ribbon"></div>
        </div>
    </div>

    <!-- 控制面板 -->
    <div class="controls">
        <div class="row">
            <button class="btn-mode" onclick="setMode('cool')">❄️</button>
            <button class="btn-power" onclick="togglePower()">⏻</button>
            <button class="btn-heat" onclick="setMode('heat')">☀️</button>
        </div>
        <div class="row">
            <button class="btn-temp" onclick="changeTemp(1)">︿</button>
        </div>
        <div class="row">
            <button class="btn-temp" onclick="changeTemp(-1)">﹀</button>
        </div>
    </div>

    <!-- 浮动提示框 -->
    <div class="float-msg" id="floatMsg">已达最低温度!</div>

    <footer>
        2026 © Air Conditioner - <a href="#">我想你了</a>
    </footer>

    <script>
        let isOn = false;
        let temp = 26;
        let mode = 'cool'; // cool or heat
        let audioCtx = null;
        let noiseNode = null;
        let gainNode = null;

        const acBody = document.getElementById('acBody');
        const tempDisplay = document.getElementById('tempDisplay');
        const floatMsg = document.getElementById('floatMsg');

        // 初始化音频环境 (需要用户交互触发)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 播放简单的“滴”声
        function playBeep(freq = 800, type = 'sine', duration = 0.1) {
            if (!audioCtx) initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        // 模拟空调运行的“白噪音” (嗡嗡声)
        function toggleRunNoise(turnOn) {
            if (!audioCtx) initAudio();

            if (turnOn) {
                if (noiseNode) return; // 已经在响了
                // 创建缓冲噪声
                const bufferSize = 2 * audioCtx.sampleRate;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }

                noiseNode = audioCtx.createBufferSource();
                noiseNode.buffer = buffer;
                noiseNode.loop = true;

                // 低通滤波器，让声音听起来像沉闷的风扇声
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;

                gainNode = audioCtx.createGain();
                gainNode.gain.value = 0.05; // 音量很小

                noiseNode.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                noiseNode.start();
            } else {
                if (noiseNode) {
                    noiseNode.stop();
                    noiseNode = null;
                }
            }
        }

        // 开关机逻辑
        function togglePower() {
            initAudio(); // 确保音频上下文已激活
            isOn = !isOn;

            if (isOn) {
                acBody.classList.add('on');
                tempDisplay.innerText = temp + "°C";
                playBeep(1200, 'square', 0.15); // 开机长滴声
                setTimeout(() => toggleRunNoise(true), 200); // 延迟一点开启运行噪音
            } else {
                acBody.classList.remove('on');
                tempDisplay.innerText = "--";
                playBeep(800, 'sine', 0.1); // 关机短滴声
                toggleRunNoise(false);
            }
        }

        // 切换模式
        function setMode(m) {
            if (!isOn) return;
            mode = m;
            playBeep(600, 'sine', 0.05);
            // 可以在这里添加改变屏幕颜色的逻辑，目前保持蓝色清爽感
        }

        // 调节温度
        function changeTemp(delta) {
            if (!isOn) {
                // 如果没开机，按温度键先开机
                togglePower();
                return;
            }

            let newTemp = temp + delta;

            // 限制温度范围
            if (newTemp < 16) {
                showFloatMsg("已达最低温度 16°C!");
                playBeep(200, 'sawtooth', 0.3); // 报警音
                return;
            }
            if (newTemp > 30) {
                showFloatMsg("已达最高温度 30°C!");
                playBeep(200, 'sawtooth', 0.3); // 报警音
                return;
            }

            temp = newTemp;
            tempDisplay.innerText = temp + "°C";
            playBeep(800, 'sine', 0.05); // 正常调节滴声
        }

        // 显示浮动提示
        function showFloatMsg(text) {
            floatMsg.innerText = text;
            floatMsg.classList.add('show');
            setTimeout(() => {
                floatMsg.classList.remove('show');
            }, 1500);
        }
    </script>
</body>
</html>
