<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朋友圈便携小空调 - 增强版</title>
    <style>
        /* --- 基础样式 --- */
        body {
            background-color: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 40px;
            user-select: none;
        }

        h1 { margin: 0; color: #333; font-size: 26px; letter-spacing: 2px; }
        .tip { color: #999; font-size: 14px; margin-top: 10px; display: flex; align-items: center; gap: 5px; }

        /* --- 空调主体 --- */
        .ac-unit {
            width: 320px;
            height: 160px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            margin-top: 30px;
            position: relative;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden; /* 防止飘带溢出 */
            transition: all 0.3s ease;
        }

        /* 左侧贴纸/能效标识 */
        .sticker {
            width: 50px;
            height: 70px;
            background: #eef2f6;
            border-radius: 5px;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
        }
        .sticker-bar { width: 30px; height: 4px; margin-bottom: 2px; border-radius: 2px; }

        /* 右侧显示屏区域 */
        .display-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: space-between;
            padding-right: 10px;
        }

        /* 模式图标 */
        .mode-icon {
            font-size: 24px;
            color: #ccc; /* 默认灰色 */
            transition: color 0.3s;
        }

        /* 温度显示 */
        .temp-display {
            font-size: 48px;
            font-weight: bold;
            color: #e0e0e0; /* 关机状态颜色 */
            font-family: 'Courier New', Courier, monospace;
            transition: color 0.3s;
        }
        .temp-display span { font-size: 24px; vertical-align: top; margin-left: 2px; }

        /* 状态指示灯 */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #eee;
            align-self: flex-end;
            transition: background-color 0.3s;
        }

        /* --- 飘带动画 (出风效果) --- */
        .ribbons-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 60px;
            pointer-events: none;
            z-index: 0; /* 在空调后面一点或者前面看需求，这里设为0配合overflow:hidden可能看不见，建议调整位置 */
            display: none; /* 默认隐藏 */
        }

        /* 将飘带放在空调内部下方 */
        .ac-unit::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 40px;
            display: flex;
            justify-content: space-around;
            /* 这里用伪元素不太好做多根飘带，改用内部div */
        }

        .wind-ribbons {
            position: absolute;
            bottom: -20px; /* 伸出底部 */
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            display: flex;
            justify-content: space-between;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .ribbon {
            width: 4px;
            height: 40px;
            background: linear-gradient(to bottom, #dcdcdc, transparent);
            border-radius: 2px;
            transform-origin: top center;
        }

        /* 动画关键帧 */
        @keyframes sway {
            0% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
            100% { transform: rotate(-10deg); }
        }

        /* 激活状态类 */
        .ac-unit.active {
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
        }
        .ac-unit.active .temp-display { color: #333; }
        .ac-unit.active .status-dot { background-color: #4caf50; box-shadow: 0 0 5px #4caf50; }
        .ac-unit.active .mode-icon.cool { color: #2196f3; }
        .ac-unit.active .mode-icon.heat { color: #ff9800; }

        .ac-unit.active .wind-ribbons { opacity: 1; }
        .ac-unit.active .ribbon { animation: sway 1.5s infinite ease-in-out; }
        .ac-unit.active .ribbon:nth-child(2) { animation-delay: 0.2s; }
        .ac-unit.active .ribbon:nth-child(3) { animation-delay: 0.4s; }

        /* 报警闪烁 */
        .alert-mode .status-dot {
            background-color: #ff4444 !important;
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }


        /* --- 控制面板 --- */
        .controls {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .row { display: flex; gap: 20px; }

        button {
            border: none;
            outline: none;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .btn-main { width: 60px; height: 60px; font-size: 24px; color: white; }
        .btn-cool { background: #4a6ee0; }
        .btn-power { background: #f03a5f; width: 65px; height: 65px; font-size: 28px;}
        .btn-heat { background: #ffb300; }

        .btn-sub { width: 50px; height: 50px; background: #e0e0e0; color: #555; font-size: 20px; }

        footer { margin-top: auto; padding-bottom: 20px; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>

    <h1>便携小空调</h1>
    <div class="tip">💡 Tip: 为你的夏日带来清凉！</div>

    <!-- 空调主体 -->
    <div class="ac-unit" id="acUnit">
        <!-- 左侧装饰 -->
        <div class="sticker">
            <div class="sticker-bar" style="background:#4caf50"></div>
            <div class="sticker-bar" style="background:#8bc34a"></div>
            <div class="sticker-bar" style="background:#ffc107"></div>
            <div class="sticker-bar" style="background:#ff9800"></div>
            <div class="sticker-bar" style="background:#f44336"></div>
        </div>

        <!-- 右侧显示区 -->
        <div class="display-area">
            <div class="mode-icon" id="modeIcon">❄️</div>
            <div class="temp-display" id="tempDisplay">--<span>°C</span></div>
            <div class="status-dot" id="statusDot"></div>
        </div>

        <!-- 飘带 (出风效果) -->
        <div class="wind-ribbons">
            <div class="ribbon"></div>
            <div class="ribbon"></div>
            <div class="ribbon"></div>
        </div>
    </div>

    <!-- 控制按钮 -->
    <div class="controls">
        <div class="row">
            <button class="btn-main btn-cool" onclick="setMode('cool')">❄️</button>
            <button class="btn-main btn-power" onclick="togglePower()">⏻</button>
            <button class="btn-main btn-heat" onclick="setMode('heat')">☀️</button>
        </div>
        <div class="row">
            <button class="btn-sub" onclick="changeTemp(1)">∧</button>
        </div>
        <div class="row">
            <button class="btn-sub" onclick="changeTemp(-1)">∨</button>
        </div>
    </div>

    <footer>
        2026 © Air Conditioner - 我想你了
    </footer>

    <script>
        // --- 状态变量 ---
        let isOn = false;
        let temp = 26;
        let mode = 'cool'; // 'cool' or 'heat'
        const minTemp = 16;
        const maxTemp = 30;

        // --- DOM 元素 ---
        const acUnit = document.getElementById('acUnit');
        const tempDisplay = document.getElementById('tempDisplay');
        const statusDot = document.getElementById('statusDot');
        const modeIcon = document.getElementById('modeIcon');

        // --- 音频系统 (Web Audio API) ---
        // 使用代码生成声音，不需要外部mp3文件，加载更快且稳定
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'power_on') {
                // 开机长音 "滴————"
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1); // 音调稍微上扬
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            } else if (type === 'power_off') {
                // 关机短音
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'beep') {
                // 普通调节音
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1000, now);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'alert') {
                // 极限温度报警 "滴滴"
                osc.type = 'square'; // 方波更刺耳
                osc.frequency.setValueAtTime(800, now);
                gainNode.gain.setValueAtTime(0.05, now);

                // 第一声
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.1);
                // 第二声
                gainNode.gain.setValueAtTime(0.05, now + 0.15);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.25);

                osc.start(now);
                osc.stop(now + 0.3);
            }
        }

        // --- 逻辑函数 ---

        function updateDisplay() {
            if (isOn) {
                acUnit.classList.add('active');
                tempDisplay.innerHTML = `${temp}<span>°C</span>`;
                modeIcon.textContent = mode === 'cool' ? '❄️' : '☀️';
                modeIcon.className = `mode-icon ${mode}`;
            } else {
                acUnit.classList.remove('active');
                acUnit.classList.remove('alert-mode'); // 关机移除报警
                tempDisplay.innerHTML = `--<span>°C</span>`;
                modeIcon.className = 'mode-icon';
                modeIcon.textContent = '';
            }
        }

        function togglePower() {
            isOn = !isOn;
            if (isOn) {
                playSound('power_on');
            } else {
                playSound('power_off');
            }
            updateDisplay();
        }

        function setMode(newMode) {
            if (!isOn) return; // 关机不能调模式
            mode = newMode;
            playSound('beep');
            updateDisplay();
        }

        function changeTemp(delta) {
            if (!isOn) return; // 关机不能调温

            let newTemp = temp + delta;

            // 检查是否达到极限
            if (newTemp < minTemp || newTemp > maxTemp) {
                playSound('alert'); // 播放报警音
                triggerAlertAnimation(); // 触发视觉闪烁
                return; // 不改变温度数值
            }

            temp = newTemp;
            playSound('beep');
            updateDisplay();
        }

        function triggerAlertAnimation() {
            acUnit.classList.add('alert-mode');
            setTimeout(() => {
                acUnit.classList.remove('alert-mode');
            }, 1000); // 闪烁1秒后恢复
        }

        // 初始化
        updateDisplay();

    </script>
</body>
</html>
