<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简文字修仙 (带存档)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background-color: #f4f4f9; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .game-container { width: 400px; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 24px; margin-bottom: 15px; color: #d35400; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; font-size: 14px; text-align: left; }
        .stat-item { background: #ecf0f1; padding: 8px; border-radius: 4px; }
        .stat-label { font-weight: bold; color: #7f8c8d; }
        
        .progress-bar { width: 100%; height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin-bottom: 15px; position: relative; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #f39c12, #e67e22); transition: width 0.3s ease; width: 0%; }
        .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; font-weight: bold; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        
        .action-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: opacity 0.2s; }
        button:hover { opacity: 0.85; }
        .btn-cultivate { background-color: #3498db; color: #fff; }
        .btn-explore { background-color: #2ecc71; color: #fff; }
        .btn-breakthrough { background-color: #9b59b6; color: #fff; }
        .btn-reset { background-color: #e74c3c; color: #fff; margin-top: 10px; font-size: 12px; padding: 8px;}
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        .log-area { height: 120px; background: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 5px; font-size: 13px; line-height: 1.6; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>⚔️ 极简文字修仙</h1>
    
    <!-- 角色状态面板 -->
    <div class="stats-grid">
        <div class="stat-item"><span class="stat-label">境界：</span><span id="realm">炼气一层</span></div>
        <div class="stat-item"><span class="stat-label">修为：</span><span id="exp">0 / 100</span></div>
        <div class="stat-item"><span class="stat-label">攻击：</span><span id="atk">10</span></div>
        <div class="stat-item"><span class="stat-label">防御：</span><span id="def">5</span></div>
    </div>
    
    <!-- 修炼进度条 -->
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0%</div>
    </div>
    
    <!-- 操作按钮 -->
    <div class="action-buttons">
        <button class="btn-cultivate" id="cultivateBtn" onclick="toggleCultivate()">开始打坐</button>
        <button class="btn-explore" onclick="explore()">探索秘境</button>
    </div>
    <div class="action-buttons">
        <button class="btn-breakthrough" id="breakthroughBtn" onclick="breakthrough()" disabled>尝试突破</button>
    </div>
    
    <!-- 消息日志 -->
    <div class="log-area" id="logArea">欢迎来到修仙世界！点击【开始打坐】获取修为。</div>
    
    <!-- 重置存档按钮 -->
    <button class="btn-reset" onclick="resetGame()">重置存档</button>
</div>

<script>
    // JS 核心逻辑
    const realms = ["炼气一层", "炼气二层", "炼气三层", "筑基期"]; 
    const SAVE_KEY = 'xiuxian_save'; // 统一的存档键名
    
    // 默认初始状态
    const defaultState = {
        realmIndex: 0,
        exp: 0,
        maxExp: 100,
        atk: 10,
        def: 5,
        isCultivating: false
    };

    let state = loadGame(); // 启动时加载存档
    let cultivateTimer = null;

    // DOM 元素获取
    const ui = {
        realm: document.getElementById('realm'),
        exp: document.getElementById('exp'),
        atk: document.getElementById('atk'),
        def: document.getElementById('def'),
        progressFill: document.getElementById('progressFill'),
        progressText: document.getElementById('progressText'),
        logArea: document.getElementById('logArea'),
        cultivateBtn: document.getElementById('cultivateBtn'),
        breakthroughBtn: document.getElementById('breakthroughBtn')
    };

    // ==================== 存档系统核心函数 ====================
    
    // 保存游戏进度
    function saveGame() {
        try {
            // 如果正在挂机，不保存挂机状态，防止刷新后立刻触发定时器
            const dataToSave = { ...state, isCultivating: false }; 
            localStorage.setItem(SAVE_KEY, JSON.stringify(dataToSave));
        } catch (e) {
            console.error("存档失败:", e);
        }
    }

    // 读取游戏进度
    function loadGame() {
        try {
            const savedData = localStorage.getItem(SAVE_KEY);
            if (savedData) {
                const parsedData = JSON.parse(savedData);
                // 简单校验关键字段是否存在，缺失则用默认值填充
                return { ...defaultState, ...parsedData };
            }
        } catch (e) {
            console.error("读档失败，将使用默认数据:", e);
        }
        return { ...defaultState };
    }

    // 重置游戏
    function resetGame() {
        if(confirm("确定要清除所有修仙进度吗？此操作不可恢复！")) {
            localStorage.removeItem(SAVE_KEY);
            location.reload(); // 重新加载页面以应用默认状态
        }
    }

    // ========================================================

    // 更新 UI 界面
    function updateUI() {
        ui.realm.textContent = realms[state.realmIndex];
        ui.exp.textContent = `${state.exp} / ${state.maxExp}`;
        ui.atk.textContent = state.atk;
        ui.def.textContent = state.def;
        
        const percent = Math.min((state.exp / state.maxExp) * 100, 100).toFixed(1);
        ui.progressFill.style.width = `${percent}%`;
        ui.progressText.textContent = `${percent}%`;
        
        ui.breakthroughBtn.disabled = state.exp < state.maxExp;
        
        // 每次数据变动都自动保存
        saveGame(); 
    }

    // 打印日志
    function log(message) {
        ui.logArea.innerHTML += `<div>${new Date().toLocaleTimeString()} - ${message}</div>`;
        ui.logArea.scrollTop = ui.logArea.scrollHeight; 
    }

    // 挂机修炼逻辑
    function toggleCultivate() {
        if (state.isCultivating) {
            clearInterval(cultivateTimer);
            state.isCultivating = false;
            ui.cultivateBtn.textContent = "开始打坐";
            log("你停止了打坐，退出修炼状态。");
        } else {
            state.isCultivating = true;
            ui.cultivateBtn.textContent = "停止打坐";
            log("你盘膝而坐，开始吸收天地灵气...");
            cultivateTimer = setInterval(() => {
                state.exp += 5;
                if (state.exp >= state.maxExp) {
                    state.exp = state.maxExp;
                    log("✨ 你的修为已满，可以尝试突破了！");
                    toggleCultivate(); 
                }
                updateUI();
            }, 1000);
        }
        updateUI();
    }

    // 探索秘境
    function explore() {
        if (state.isCultivating) {
            log("⚠️ 正在打坐中，无法分心探索秘境！");
            return;
        }
        const events = [
            "你在草丛中发现了一株灵草，修为+10！",
            "遇到了一只低阶妖兽，经过一番苦战将其击退，获得少量修为。",
            "你意外跌入一个隐秘洞穴，发现前辈留下的功法，攻击+2！",
            "什么都没发生，只吹了一阵冷风。"
        ];
        const randomEvent = events[Math.floor(Math.random() * events.length)];
        log(randomEvent);
        
        if (randomEvent.includes("灵草")) state.exp += 10;
        if (randomEvent.includes("功法")) state.atk += 2;
        if (randomEvent.includes("妖兽")) state.exp += 3;
        updateUI();
    }

    // 境界突破
    function breakthrough() {
        if (state.exp < state.maxExp) return;
        if (state.realmIndex >= realms.length - 1) {
            log("🎉 恭喜你已达到当前版本最高境界！");
            return;
        }
        
        state.realmIndex++;
        state.exp = 0;
        state.maxExp = Math.floor(state.maxExp * 1.5); 
        state.atk += 5;
        state.def += 3;
        
        log(`🌟 轰隆一声！你成功突破至【${realms[state.realmIndex]}】！全属性提升！`);
        updateUI();
    }

    // 初始化
    updateUI();
    log("存档已自动加载，继续你的修仙之旅吧！");
</script>

</body>
</html>
