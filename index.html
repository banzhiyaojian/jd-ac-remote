<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朋友圈便携小空调</title>
    <style>
        /* --- 基础布局 --- */
        body {
            background-color: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 40px;
            user-select: none; /* 防止双击选中文字 */
        }

        h1 { margin: 0; color: #333; font-size: 26px; letter-spacing: 2px; }
        .tip { color: #999; font-size: 14px; margin-top: 10px; display: flex; align-items: center; gap: 5px; }

        /* --- 空调主体 --- */
        .ac-body {
            width: 320px;
            height: 120px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-top: 30px;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            transition: all 0.3s ease;
        }

        /* 左侧贴纸/能效标 */
        .sticker {
            width: 50px;
            height: 60px;
            background: linear-gradient(to bottom, #e3f2fd, #bbdefb);
            border: 2px solid #2196f3;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0.8;
        }
        .sticker-bar { width: 30px; height: 4px; margin: 2px 0; border-radius: 2px; }

        /* 右侧显示屏区域 */
        .display-area {
            flex-grow: 1;
            text-align: right;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding-right: 10px;
        }

        /* 状态指示灯 */
        .led {
            width: 8px;
            height: 8px;
            background-color: #ddd;
            border-radius: 50%;
            margin-bottom: 10px;
            transition: background-color 0.3s;
        }
        .led.on { background-color: #00e676; box-shadow: 0 0 8px #00e676; }

        /* 温度数字 */
        .temp-display {
            font-size: 48px;
            font-weight: bold;
            color: #eee; /* 关机时暗淡 */
            font-family: 'Courier New', monospace;
            transition: color 0.3s;
        }
        .temp-display.on { color: #333; }

        /* 模式图标 */
        .mode-icon {
            font-size: 24px;
            margin-top: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .mode-icon.show { opacity: 1; }

        /* 出风口飘带动画 */
        .ribbons {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .ribbon {
            width: 4px;
            height: 40px;
            background: #ccc;
            border-radius: 2px;
            transform-origin: top center;
        }
        /* 飘动动画关键帧 */
        @keyframes swing {
            0% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
            100% { transform: rotate(-10deg); }
        }
        .ribbons.active .ribbon {
            animation: swing 1s infinite ease-in-out;
        }
        .ribbons.active .ribbon:nth-child(2) { animation-delay: 0.2s; }
        .ribbons.active .ribbon:nth-child(3) { animation-delay: 0.4s; }


        /* --- 控制面板 --- */
        .controls {
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .row { display: flex; gap: 25px; }

        button {
            border: none;
            outline: none;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 按钮特定样式 */
        .btn-mode { width: 60px; height: 60px; font-size: 24px; color: white; }
        .btn-cool { background-color: #3f51b5; } /* 深蓝 */
        .btn-power { width: 70px; height: 70px; font-size: 30px; background-color: #e91e63; color: white; } /* 玫红 */
        .btn-heat { width: 60px; height: 60px; font-size: 24px; background-color: #ffc107; color: white; } /* 黄色 */

        .btn-temp { width: 50px; height: 50px; background-color: #e0e0e0; color: #555; font-size: 20px; }

        /* 底部版权 */
        footer { margin-top: auto; padding-bottom: 30px; color: #aaa; font-size: 12px; }
        footer a { color: #8ab4f8; text-decoration: none; }

    </style>
</head>
<body>

    <h1>便携小空调</h1>
    <div class="tip">💡 Tip: 为你的夏日带来清凉！</div>

    <!-- 空调主体 -->
    <div class="ac-body">
        <div class="sticker">
            <div class="sticker-bar" style="background:#4caf50"></div>
            <div class="sticker-bar" style="background:#8bc34a"></div>
            <div class="sticker-bar" style="background:#ffeb3b"></div>
            <div class="sticker-bar" style="background:#ff9800"></div>
            <div class="sticker-bar" style="background:#f44336"></div>
        </div>

        <div class="display-area">
            <div class="led" id="led"></div>
            <div class="temp-display" id="tempDisplay">--</div>
            <div class="mode-icon" id="modeIcon">❄️</div>
        </div>

        <!-- 飘带 -->
        <div class="ribbons" id="ribbons">
            <div class="ribbon"></div>
            <div class="ribbon"></div>
            <div class="ribbon"></div>
        </div>
    </div>

    <!-- 控制按钮 -->
    <div class="controls">
        <div class="row">
            <button class="btn-mode btn-cool" onclick="setMode('cool')">❄️</button>
            <button class="btn-power" onclick="togglePower()">⏻</button>
            <button class="btn-mode btn-heat" onclick="setMode('heat')">☀️</button>
        </div>
        <div class="row">
            <button class="btn-temp" onclick="changeTemp(1)">∧</button>
        </div>
        <div class="row">
            <button class="btn-temp" onclick="changeTemp(-1)">∨</button>
        </div>
    </div>

    <footer>
        2026 © Air Conditioner - <a href="#">我想你了</a>
    </footer>

    <!-- 音频资源：使用Base64编码的短促“滴”声，无需外部链接 -->
    <audio id="beepSound" src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU"></audio>

    <script>
        // 初始化状态
        let isOn = false;
        let temperature = 26;
        let currentMode = 'cool'; // 'cool' or 'heat'

        const tempDisplay = document.getElementById('tempDisplay');
        const modeIcon = document.getElementById('modeIcon');
        const led = document.getElementById('led');
        const ribbons = document.getElementById('ribbons');
        const beepSound = document.getElementById('beepSound');

        // 生成一个简单的“滴”声 (如果上面的base64太短或无效，浏览器通常会忽略或播放极短噪音，这里为了兼容性用JS生成振荡器更好，但为了简单我们用下面的函数模拟)
        // 更好的方式：使用 Web Audio API 生成哔哔声，不依赖外部文件
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // 880Hz 高音
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1); // 持续0.1秒
        }

        // 开关机逻辑
        function togglePower() {
            playBeep(); // 播放声音

            isOn = !isOn;

            if (isOn) {
                // 开机状态
                led.classList.add('on');
                tempDisplay.classList.add('on');
                tempDisplay.innerText = temperature + "°C";
                modeIcon.classList.add('show');
                ribbons.classList.add('active'); // 开启飘带动画
                updateModeIcon();
            } else {
                // 关机状态
                led.classList.remove('on');
                tempDisplay.classList.remove('on');
                tempDisplay.innerText = "--";
                modeIcon.classList.remove('show');
                ribbons.classList.remove('active'); // 停止飘带
            }
        }

        // 调节温度
        function changeTemp(delta) {
            if (!isOn) {
                // 如果没开机，按温度键先开机（可选逻辑，或者只是没反应）
                // 这里设定为没开机按键无反应，或者你可以选择自动开机
                return;
            }
            playBeep();
            temperature += delta;
            // 限制温度范围
            if (temperature > 30) temperature = 30;
            if (temperature < 16) temperature = 16;

            tempDisplay.innerText = temperature + "°C";
        }

        // 切换模式
        function setMode(mode) {
            if (!isOn) return;
            playBeep();
            currentMode = mode;
            updateModeIcon();
        }

        function updateModeIcon() {
            if (currentMode === 'cool') {
                modeIcon.innerText = "❄️";
                modeIcon.style.color = "#2196f3";
            } else {
                modeIcon.innerText = "☀️";
                modeIcon.style.color = "#ff9800";
            }
        }
    </script>
</body>
</html>
