<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>便携小空调 - 终极验证版</title>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        .ac-unit {
            width: 80vw;
            max-width: 320px;
            height: 120px;
            background: linear-gradient(to bottom, #ffffff, #f0f0f0);
            border-radius: 15px 15px 40px 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }
        .logo {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 14px;
            color: #ccc;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .display {
            position: absolute;
            top: 15px;
            right: 25px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 32px;
            color: #333;
            opacity: 0.2;
            transition: all 0.3s;
        }
        .display.on {
            color: #00ff00;
            opacity: 1;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        
        /* --- 导风板与扫风动画 --- */
        .vent {
            position: absolute;
            bottom: 15px;
            left: 20px;
            right: 20px;
            height: 10px;
            background-color: #ddd;
            border-radius: 5px;
            transition: transform 0.5s;
            transform-origin: top;
            z-index: 11;
            overflow: hidden;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .vent.open {
            transform: rotateX(45deg);
            background-color: #333;
        }
        .vertical-blades {
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: space-around;
        }
        .blade {
            width: 4px;
            height: 100%;
            background-color: #555;
            border-radius: 2px;
            transform-origin: center;
        }
        /* 上下扫风 */
        @keyframes swingVertical {
            0%, 100% { transform: rotateX(45deg); }
            50% { transform: rotateX(70deg); }
        }
        .vent.swing-up-down {
            animation: swingVertical 3s ease-in-out infinite;
        }
        /* 左右扫风 */
        @keyframes swingHorizontal {
            0%, 100% { transform: rotateY(-25deg); }
            50% { transform: rotateY(25deg); }
        }
        .vent.swing-left-right .blade {
            animation: swingHorizontal 2.5s ease-in-out infinite;
        }
        .vent.swing-left-right .blade:nth-child(2) { animation-delay: 0.1s; }
        .vent.swing-left-right .blade:nth-child(3) { animation-delay: 0.2s; }
        .vent.swing-left-right .blade:nth-child(4) { animation-delay: 0.3s; }
        .vent.swing-left-right .blade:nth-child(5) { animation-delay: 0.2s; }
        .vent.swing-left-right .blade:nth-child(6) { animation-delay: 0.1s; }

        /* --- 虚线出风特效 --- */
        .wind-container {
            position: absolute;
            bottom: -90px;
            left: 40px;
            right: 40px;
            height: 100px;
            display: flex;
            justify-content: space-between;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            overflow: hidden;
        }
        .wind-container.blowing {
            opacity: 1;
        }
        .wind-line {
            width: 2px;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 191, 255, 0.6) 1px, transparent 1px);
            background-size: 4px 10px;
            opacity: 0;
        }
        @keyframes windFlow {
            0% { transform: translateY(-20px); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.4; }
            100% { transform: translateY(80px); opacity: 0; }
        }

        /* 遥控器 */
        .remote {
            margin-top: 60px;
            background-color: #fff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            display: flex;
            gap: 10px;
            width: 80vw;
            max-width: 320px;
            box-sizing: border-box;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 60px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.95); }
        .btn-power { background-color: #ff4d4f; color: white; }
        .btn-temp { background-color: #1890ff; color: white; }
        .btn-swing { background-color: #faad14; color: white; }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center;">
        <div class="ac-unit">
            <div class="logo">COOL SUMMER</div>
            <div class="display" id="display">26°C</div>
            <!-- 整合了扫风叶片的出风口结构 -->
            <div class="vent" id="vent">
                <div class="vertical-blades">
                    <div class="blade"></div><div class="blade"></div><div class="blade"></div>
                    <div class="blade"></div><div class="blade"></div><div class="blade"></div><div class="blade"></div>
                </div>
            </div>
            <div class="wind-container" id="windContainer"></div>
        </div>

        <div class="remote">
            <button class="btn-power" onclick="togglePower()">电源</button>
            <button class="btn-temp" onclick="changeTemp(-1)">降温❄️</button>
            <button class="btn-temp" onclick="changeTemp(1)">升温☀️</button>
            <button class="btn-swing" onclick="toggleSwing()">扫风</button>
        </div>
    </div>

    <script>
        let isOn = false;
        let temperature = 26;
        let swingMode = 0; // 0:关闭, 1:上下, 2:左右, 3:全扫
        let windAudio = null;

        const display = document.getElementById('display');
        const vent = document.getElementById('vent');
        const windContainer = document.getElementById('windContainer');

        // 初始化虚线风
        const windLineCount = 15;
        const windLines = [];
        for (let i = 0; i < windLineCount; i++) {
            const line = document.createElement('div');
            line.className = 'wind-line';
            windContainer.appendChild(line);
            windLines.push(line);
        }

        // 初始化在线白噪音音频
        function initAudio() {
            if (!windAudio) {
                // 使用在线免版权白噪音素材模拟风声
                windAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2515/2515-preview.mp3');
                windAudio.loop = true;
            }
        }

        // 核心：根据温度更新风速和音量
        function updateWindEffect() {
            if (!isOn) return;
            // 温度越高，风速越快（动画时长越短）
            const speed = 2.5 - ((temperature - 16) / (31 - 16)) * 1.9;
            windLines.forEach(line => {
                const currentDelay = line.style.animationDelay || '0s';
                line.style.animation = `windFlow ${speed}s linear infinite ${currentDelay}`;
            });
            // 温度越高，音量越大
            if (windAudio) {
                const volume = 0.2 + ((temperature - 16) / (31 - 16)) * 0.8;
                windAudio.volume = Math.min(volume, 1.0);
            }
        }

        function playBeep() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') audioContext.resume();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        function togglePower() {
            isOn = !isOn;
            playBeep();
            initAudio();

            if (isOn) {
                display.classList.add('on');
                vent.classList.add('open');
                windContainer.classList.add('blowing');
                windAudio.play();
                updateWindEffect();
            } else {
                display.classList.remove('on');
                vent.classList.remove('open', 'swing-up-down', 'swing-left-right');
                windContainer.classList.remove('blowing');
                windAudio.pause();
                swingMode = 0; // 关机重置扫风状态
            }
        }

        function toggleSwing() {
            if (!isOn) return;
            playBeep();
            swingMode = (swingMode + 1) % 4;
            vent.classList.remove('swing-up-down', 'swing-left-right');
            
            if (swingMode === 1) vent.classList.add('swing-up-down');
            else if (swingMode === 2) vent.classList.add('swing-left-right');
            else if (swingMode === 3) vent.classList.add('swing-up-down', 'swing-left-right');
        }

        function changeTemp(delta) {
            if (!isOn) return;
            temperature += delta;
            if (temperature < 16) temperature = 16;
            if (temperature > 31) temperature = 31;
            display.innerText = temperature + '°C';
            playBeep();
            updateWindEffect();
        }
    </script>
</body>
</html>
